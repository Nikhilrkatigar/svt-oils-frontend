<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVT Oils - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fffbf0;
        color: #1c1917;
      }
      main {
        width: min(90vw, 420px);
        background: white;
        border: 1px solid #e7e5e4;
        border-radius: 12px;
        padding: 28px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      img {
        width: 64px;
        height: 64px;
      }
      h1 {
        margin: 16px 0 8px;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        color: #57534e;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/svt-logo.png" alt="SVT Oils" />
      <h1>You are offline</h1>
      <p>Please check your internet connection. Previously opened pages may still be available.</p>
    </main>
  </body>
</html>
